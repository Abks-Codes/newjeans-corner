<!DOCTYPE html>
<html lang="en">

<body>

        <div class="description">Danielle</div>
      </div>

    </div>

    <div id="info">
      <p id="details">
        NewJeans is a South Korean girl group with five members, known for their fresh,
        youthful vibe and Y2K-inspired pop sound. Popular songs include "ETA," "OMG,"
        and "Ditto." Click any member above to learn more about her.
